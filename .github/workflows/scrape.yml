name: Daily scrape

# Free on PUBLIC repositories — GitHub Actions minutes are unlimited for public repos.
on:
  schedule:
    # Daily at 07:00 UTC. Cron is always UTC; adjust to taste.
    - cron: '0 7 * * *'
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to commit the refreshed data back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (live)
        run: python -m src.cli --live

      - name: Commit updated data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.csv dashboard/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh scraped data ($(date -u +%Y-%m-%d))"
            git push
          fi
